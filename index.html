<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CATS CRADLE — Hand String Art</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cyan: #00fff7;
    --magenta: #ff00e5;
    --yellow: #ffee00;
    --bg: #030610;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
    font-family: 'Share Tech Mono', monospace;
    color: var(--cyan);
  }

  #app {
    position: relative;
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }

  /* Hidden video source */
  #videoEl {
    position: absolute;
    width: 1px; height: 1px;
    opacity: 0; pointer-events: none;
  }

  /* Main canvas fills viewport */
  #mainCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: block;
  }

  /* HUD overlay */
  #hud {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
  }

  .hud-corner {
    position: absolute;
    width: 48px; height: 48px;
    border-color: var(--cyan);
    border-style: solid;
    opacity: 0.5;
  }
  .hud-corner.tl { top: 16px; left: 16px; border-width: 2px 0 0 2px; }
  .hud-corner.tr { top: 16px; right: 16px; border-width: 2px 2px 0 0; }
  .hud-corner.bl { bottom: 16px; left: 16px; border-width: 0 0 2px 2px; }
  .hud-corner.br { bottom: 16px; right: 16px; border-width: 0 2px 2px 0; }

  #title {
    position: absolute;
    top: 20px; left: 50%; transform: translateX(-50%);
    font-family: 'Orbitron', sans-serif;
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.35em;
    color: var(--cyan);
    text-shadow: 0 0 12px var(--cyan), 0 0 30px var(--cyan);
    opacity: 0.85;
    white-space: nowrap;
  }

  #status {
    position: absolute;
    bottom: 22px; left: 50%; transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--magenta);
    text-shadow: 0 0 8px var(--magenta);
    opacity: 0.7;
    white-space: nowrap;
  }

  #hand-info {
    position: absolute;
    bottom: 42px; left: 50%; transform: translateX(-50%);
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--yellow);
    text-shadow: 0 0 6px var(--yellow);
    opacity: 0.6;
  }

  /* Permission overlay */
  #permission-screen {
    position: absolute;
    inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 24px;
    background: var(--bg);
    z-index: 10;
  }
  #permission-screen h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(18px, 4vw, 36px);
    letter-spacing: 0.3em;
    color: var(--cyan);
    text-shadow: 0 0 20px var(--cyan), 0 0 60px var(--cyan);
    text-align: center;
  }
  #permission-screen p {
    font-size: 13px;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.5);
    text-align: center;
    max-width: 360px;
    line-height: 1.8;
  }
  #startBtn {
    margin-top: 8px;
    padding: 14px 40px;
    background: transparent;
    border: 1px solid var(--cyan);
    color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.3em;
    cursor: pointer;
    text-transform: uppercase;
    box-shadow: 0 0 20px rgba(0,255,247,0.3), inset 0 0 20px rgba(0,255,247,0.05);
    transition: all 0.2s ease;
  }
  #startBtn:hover {
    background: rgba(0,255,247,0.1);
    box-shadow: 0 0 40px rgba(0,255,247,0.5), inset 0 0 30px rgba(0,255,247,0.1);
  }

  .scanline {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.07) 2px,
      rgba(0,0,0,0.07) 4px
    );
    pointer-events: none;
    z-index: 5;
  }
</style>
</head>
<body>
<div id="app">
  <video id="videoEl" playsinline autoplay muted></video>
  <canvas id="mainCanvas"></canvas>

  <div class="scanline"></div>

  <div id="hud">
    <div class="hud-corner tl"></div>
    <div class="hud-corner tr"></div>
    <div class="hud-corner bl"></div>
    <div class="hud-corner br"></div>
    <div id="title">CATS CRADLE // BIOMETRIC STRING</div>
    <div id="hand-info" style="display:none"></div>
    <div id="status">AWAITING CAMERA INPUT</div>
  </div>

  <div id="permission-screen">
    <h1>CATS CRADLE</h1>
    <p>Hold both hands up to weave luminous strings between your fingertips.</p>
    <button id="startBtn">INITIALIZE CAMERA</button>
  </div>
</div>

<!-- MediaPipe via CDN -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
(function() {
  'use strict';

  const videoEl = document.getElementById('videoEl');
  const canvas  = document.getElementById('mainCanvas');
  const ctx     = canvas.getContext('2d');
  const statusEl   = document.getElementById('status');
  const handInfoEl = document.getElementById('hand-info');
  const permScreen = document.getElementById('permission-screen');
  const startBtn   = document.getElementById('startBtn');

  // ── Resize ────────────────────────────────────────────────────────────────
  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // ── State ─────────────────────────────────────────────────────────────────
  let latestResults = null;
  let frameCount = 0;
  let lastTime = performance.now();
  let fps = 0;

  // Smoothed landmark positions for elastic feel
  const SMOOTH = 0.3; // lerp factor (0=no movement, 1=instant)
  const smoothedHands = {}; // keyed by handedness label

  // Color palette
  const CYAN    = '#00fff7';
  const MAGENTA = '#ff00e5';
  const YELLOW  = '#ffee00';

  // Fingertip landmark indices: thumb(4), index(8), middle(12), ring(16), pinky(20)
  const FINGERTIPS = [4, 8, 12, 16, 20];
  // All joints for dots
  const ALL_LANDMARKS = Array.from({length: 21}, (_, i) => i);

  // Knuckle connections for hand skeleton
  const CONNECTIONS = [
    [0,1],[1,2],[2,3],[3,4],
    [0,5],[5,6],[6,7],[7,8],
    [5,9],[9,10],[10,11],[11,12],
    [9,13],[13,14],[14,15],[15,16],
    [13,17],[0,17],[17,18],[18,19],[19,20]
  ];

  // ── Lerp helper ───────────────────────────────────────────────────────────
  function lerp(a, b, t) { return a + (b - a) * t; }

  function lerpPoint(prev, next, t) {
    return { x: lerp(prev.x, next.x, t), y: lerp(prev.y, next.y, t) };
  }

  // ── Color helpers ─────────────────────────────────────────────────────────
  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return {r,g,b};
  }

  function lerpColor(c1, c2, t) {
    return {
      r: Math.round(lerp(c1.r, c2.r, t)),
      g: Math.round(lerp(c1.g, c2.g, t)),
      b: Math.round(lerp(c1.b, c2.b, t))
    };
  }

  function rgbStr({r,g,b}, a=1) {
    return `rgba(${r},${g},${b},${a})`;
  }

  // String color: cyan→magenta→yellow based on stretch
  function stringColor(t, alpha=1) {
    const c1 = hexToRgb(CYAN);
    const c2 = hexToRgb(MAGENTA);
    const c3 = hexToRgb(YELLOW);
    let c;
    if (t < 0.5) c = lerpColor(c1, c2, t * 2);
    else         c = lerpColor(c2, c3, (t - 0.5) * 2);
    return rgbStr(c, alpha);
  }

  // ── Draw a glowing dot ────────────────────────────────────────────────────
  function drawDot(x, y, radius, color, blur=16) {
    ctx.save();
    ctx.shadowBlur  = blur;
    ctx.shadowColor = color;
    ctx.fillStyle   = color;
    ctx.beginPath();
    ctx.arc(x, y, radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // ── Draw glowing line ─────────────────────────────────────────────────────
  function drawGlowLine(x1, y1, x2, y2, color, width, blur=20) {
    ctx.save();
    ctx.shadowBlur  = blur;
    ctx.shadowColor = color;
    ctx.strokeStyle = color;
    ctx.lineWidth   = width;
    ctx.lineCap     = 'round';
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    ctx.restore();
  }

  // ── Draw curved string between two points ─────────────────────────────────
  function drawString(x1, y1, x2, y2, stretch, idx) {
    const dist = Math.hypot(x2-x1, y2-y1);
    const maxDist = Math.min(canvas.width, canvas.height) * 0.9;
    const t = Math.min(dist / maxDist, 1); // 0=close, 1=far apart

    const color = stringColor(t);
    const width = lerp(3.5, 1, t);         // thicker when close
    const blur  = lerp(30, 12, t);

    // Slight sag / curve in the middle using quadratic bezier
    const sagAmt = lerp(30, -20, t); // sags down when close, snaps up when stretched
    const angle  = Math.atan2(y2 - y1, x2 - x1) + Math.PI / 2;
    const cx = (x1 + x2) / 2 + Math.cos(angle) * sagAmt;
    const cy = (y1 + y2) / 2 + Math.sin(angle) * sagAmt;

    ctx.save();
    ctx.shadowBlur  = blur;
    ctx.shadowColor = color;
    ctx.strokeStyle = color;
    ctx.lineWidth   = width;
    ctx.lineCap     = 'round';

    // Draw twice for stronger glow
    for (let pass = 0; pass < 2; pass++) {
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.quadraticCurveTo(cx, cy, x2, y2);
      ctx.stroke();
    }

    // Subtle center-line highlight
    ctx.shadowBlur  = 4;
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth   = width * 0.3;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.quadraticCurveTo(cx, cy, x2, y2);
    ctx.stroke();

    ctx.restore();
  }

  // ── Draw hand skeleton ────────────────────────────────────────────────────
  function drawSkeleton(lms, handColor) {
    for (const [a, b] of CONNECTIONS) {
      const pa = lms[a], pb = lms[b];
      drawGlowLine(pa.x, pa.y, pb.x, pb.y, handColor, 1, 8);
    }
  }

  // ── Draw landmark dots ────────────────────────────────────────────────────
  function drawLandmarks(lms, handColor) {
    for (let i = 0; i < lms.length; i++) {
      const {x, y} = lms[i];
      const isTip = FINGERTIPS.includes(i);
      const r = isTip ? 5 : 3;
      const blur = isTip ? 22 : 10;
      drawDot(x, y, r, isTip ? '#ffffff' : handColor, blur);
      if (isTip) {
        // outer ring
        ctx.save();
        ctx.shadowBlur  = 30;
        ctx.shadowColor = handColor;
        ctx.strokeStyle = handColor;
        ctx.lineWidth   = 1;
        ctx.beginPath();
        ctx.arc(x, y, 9, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }
    }
  }

  // ── Map normalized coords to canvas ──────────────────────────────────────
  function mapLandmarks(rawLms) {
    return rawLms.map(lm => ({
      x: (1 - lm.x) * canvas.width,   // mirror X
      y: lm.y * canvas.height
    }));
  }

  // ── Smooth landmarks over time ────────────────────────────────────────────
  function smoothLandmarks(label, mapped) {
    if (!smoothedHands[label]) {
      smoothedHands[label] = mapped.map(p => ({...p}));
      return smoothedHands[label];
    }
    const prev = smoothedHands[label];
    for (let i = 0; i < mapped.length; i++) {
      prev[i] = lerpPoint(prev[i], mapped[i], SMOOTH);
    }
    return prev;
  }

  // ── Main render loop ──────────────────────────────────────────────────────
  function render() {
    requestAnimationFrame(render);

    // FPS
    frameCount++;
    const now = performance.now();
    if (now - lastTime > 500) {
      fps = Math.round(frameCount * 1000 / (now - lastTime));
      frameCount = 0; lastTime = now;
    }

    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);

    // ── 1. Draw video feed ─────────────────────────────────────────────────
    if (videoEl.readyState >= 2) {
      ctx.save();
      ctx.translate(W, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(videoEl, 0, 0, W, H);
      ctx.restore();

      // Dark vignette overlay
      const vignette = ctx.createRadialGradient(W/2, H/2, H*0.2, W/2, H/2, H*0.8);
      vignette.addColorStop(0, 'rgba(3,6,16,0)');
      vignette.addColorStop(1, 'rgba(3,6,16,0.75)');
      ctx.fillStyle = vignette;
      ctx.fillRect(0, 0, W, H);
    }

    if (!latestResults) return;

    const { multiHandLandmarks, multiHandedness } = latestResults;
    if (!multiHandLandmarks || multiHandLandmarks.length === 0) {
      statusEl.textContent = 'SCANNING FOR HANDS...';
      handInfoEl.style.display = 'none';
      return;
    }

    // ── 2. Process hands ───────────────────────────────────────────────────
    const hands = {};
    for (let i = 0; i < multiHandLandmarks.length; i++) {
      // MediaPipe labels are from camera's perspective; we mirror X so swap them
      const rawLabel = multiHandedness[i].label; // 'Left' or 'Right'
      const label = rawLabel === 'Left' ? 'Right' : 'Left';
      const mapped   = mapLandmarks(multiHandLandmarks[i]);
      const smoothed = smoothLandmarks(label, mapped);
      hands[label]   = smoothed;
    }

    const leftHand  = hands['Left'];
    const rightHand = hands['Right'];
    const count     = Object.keys(hands).length;

    statusEl.textContent = count === 2
      ? 'TWO HANDS DETECTED — STRING ACTIVE'
      : `${count === 1 ? 'ONE' : 'ZERO'} HAND${count !== 1 ? 'S' : ''} DETECTED`;
    handInfoEl.style.display = count > 0 ? 'block' : 'none';
    handInfoEl.textContent = `${fps} FPS · ${count} HAND${count !== 1 ? 'S' : ''}`;

    // ── 3. Draw strings between fingertips (if both hands) ─────────────────
    if (leftHand && rightHand) {
      // Compute overall hand separation for global stretch
      const lPalm = leftHand[0], rPalm = rightHand[0];
      const palmDist = Math.hypot(rPalm.x - lPalm.x, rPalm.y - lPalm.y);

      for (let i = 0; i < FINGERTIPS.length; i++) {
        const li = FINGERTIPS[i];
        const ri = FINGERTIPS[i];
        const lp = leftHand[li];
        const rp = rightHand[ri];
        drawString(lp.x, lp.y, rp.x, rp.y, palmDist, i);
      }

      // Extra: cross-strings (thumb-to-pinky) for cradle effect
      const crossPairs = [
        [FINGERTIPS[0], FINGERTIPS[4]],
        [FINGERTIPS[4], FINGERTIPS[0]],
        [FINGERTIPS[1], FINGERTIPS[3]],
        [FINGERTIPS[3], FINGERTIPS[1]],
      ];
      ctx.globalAlpha = 0.35;
      for (const [li, ri] of crossPairs) {
        const lp = leftHand[li];
        const rp = rightHand[ri];
        drawString(lp.x, lp.y, rp.x, rp.y, palmDist, li);
      }
      ctx.globalAlpha = 1;
    }

    // ── 4. Draw skeletons ──────────────────────────────────────────────────
    if (leftHand) {
      ctx.globalAlpha = 0.25;
      drawSkeleton(leftHand, CYAN);
      ctx.globalAlpha = 1;
    }
    if (rightHand) {
      ctx.globalAlpha = 0.25;
      drawSkeleton(rightHand, MAGENTA);
      ctx.globalAlpha = 1;
    }

    // ── 5. Draw landmark dots ──────────────────────────────────────────────
    if (leftHand)  drawLandmarks(leftHand,  CYAN);
    if (rightHand) drawLandmarks(rightHand, MAGENTA);

    // ── 6. Ambient particle trail on fingertips ───────────────────────────
    if (leftHand || rightHand) {
      spawnParticles(leftHand, rightHand);
      drawParticles();
    }
  }

  // ── Simple particle system for fingertip trails ───────────────────────────
  const particles = [];
  const MAX_PARTICLES = 300;

  function spawnParticles(lh, rh) {
    const sources = [];
    if (lh) FINGERTIPS.forEach(i => sources.push({ ...lh[i], color: CYAN }));
    if (rh) FINGERTIPS.forEach(i => sources.push({ ...rh[i], color: MAGENTA }));

    for (const s of sources) {
      if (Math.random() > 0.35) continue;
      particles.push({
        x: s.x + (Math.random()-0.5)*8,
        y: s.y + (Math.random()-0.5)*8,
        vx: (Math.random()-0.5)*1.5,
        vy: -Math.random()*1.5 - 0.5,
        life: 1,
        decay: 0.03 + Math.random()*0.04,
        size: Math.random()*2.5+1,
        color: s.color
      });
    }

    while (particles.length > MAX_PARTICLES) particles.shift();
  }

  function drawParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x   += p.vx;
      p.y   += p.vy;
      p.life -= p.decay;
      if (p.life <= 0) { particles.splice(i, 1); continue; }

      ctx.save();
      ctx.globalAlpha = p.life * 0.7;
      ctx.shadowBlur  = 8;
      ctx.shadowColor = p.color;
      ctx.fillStyle   = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  // ── MediaPipe init ────────────────────────────────────────────────────────
  function initMediaPipe(stream) {
    videoEl.srcObject = stream;
    videoEl.play();

    const hands = new Hands({
      locateFile: (file) =>
        `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 2,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.6,
    });

    hands.onResults((results) => {
      latestResults = results;
    });

    const camera = new Camera(videoEl, {
      onFrame: async () => { await hands.send({ image: videoEl }); },
      width: 640,
      height: 480,
    });

    camera.start()
      .then(() => {
        permScreen.style.display = 'none';
        statusEl.textContent = 'SCANNING FOR HANDS...';
        render();
      })
      .catch(err => {
        statusEl.textContent = 'CAMERA ERROR: ' + err.message;
      });
  }

  // ── Start button ──────────────────────────────────────────────────────────
  startBtn.addEventListener('click', () => {
    startBtn.textContent = 'CONNECTING...';
    startBtn.disabled = true;

    navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: 'user' },
      audio: false
    })
    .then(stream => initMediaPipe(stream))
    .catch(err => {
      startBtn.textContent = 'PERMISSION DENIED';
      statusEl.textContent = 'CAMERA ACCESS DENIED';
      console.error(err);
    });
  });

})();
</script>
</body>
</html>
